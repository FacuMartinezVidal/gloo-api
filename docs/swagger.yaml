      summary: Get comment by ID
      tags:
      - Comments
    put:
      consumes:
      - application/json
      description: Update a specific comment by its ID
      parameters:
      - description: Recipe ID
        in: path
        minimum: 1
        name: recipeId
        required: true
        type: integer
      - description: Comment ID
        in: path
        minimum: 1
        name: commentId
        required: true
        type: integer
      - description: Comment
        in: body
        name: comment
        required: true
        schema:
          $ref: '#/definitions/models.UpdateCommentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated comment
          schema:
            $ref: '#/definitions/models.UpdateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorBadRequestResponse'
        "404":
          description: Comment not found
          schema:
