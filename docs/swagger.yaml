paths:
  /collections/{userId}:
    get:
      consumes:
      - application/json
      description: Get all collections
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved collections
          schema:
            $ref: '#/definitions/models.GetAllCollectionsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorBadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorNotFoundResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServerErrorResponse'
      summary: Get all collections
      tags:
      - Collections
    post:
      consumes:
      - application/json
      description: Create a collection
      parameters:
      - description: Collection
        in: body
        name: collection
        required: true
        schema:
          $ref: '#/definitions/models.CreateCollectionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Collection created successfully
          schema:
            $ref: '#/definitions/models.CreateResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorBadRequestResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServerErrorResponse'
      summary: Create a collection
      tags:
      - Collections
  /collections/{userId}/{collectionId}:
    get:
      consumes:
      - application/json
      description: Get collection by ID
      parameters:
      - description: Collection ID
        in: path
        name: collectionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved collection
          schema:
            $ref: '#/definitions/models.GetCollectionByIdResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorBadRequestResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorNotFoundResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorInternalServerErrorResponse'
      summary: Get collection by ID
      tags:
      - Collections
  /comments/{recipeId}/{commentId}:
    delete:
      consumes:
      - application/json
      description: Delete a specific comment by its ID
      parameters:
      - description: Recipe ID
        in: path
        minimum: 1
        name: recipeId
        required: true
        type: integer
      - description: Comment ID
        in: path
        minimum: 1
        name: commentId
        required: true
        type: integer
      produces:
      - application/json
      responses:
