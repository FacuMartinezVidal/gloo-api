basePath: /api
definitions:
  models.BaseResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: string
      status_code:
        type: integer
      success:
        type: boolean
    type: object
  models.ErrorResponse:
    properties:
      data: {}
      message:
        example: Solicitud inválida
        type: string
      status:
        example: error
        type: string
      status_code:
        example: 400
        type: integer
      success:
        example: false
        type: boolean
    type: object
  models.Recipe:
    properties:
      category:
        type: string
      created_by:
        type: string
      description:
        type: string
      estimated_time:
        type: string
      id:
        type: integer
      image_url:
        type: string
      title:
        type: string
      total_comments:
        type: integer
      total_likes:
        type: integer
      total_stars:
        type: number
    type: object
  models.RecipeExampleResponse:
    properties:
      data:
        properties:
          category:
            example: Chicken
            type: string
          recipes:
            items:
              type: object
            type: array
          searchParam:
            example: chicken
            type: string
        type: object
      message:
        example: Operación completada con éxito
        type: string
      status:
        example: success
        type: string
      status_code:
        example: 200
        type: integer
      success:
        example: true
        type: boolean
    type: object
host: gloo-api-production.up.railway.app
info:
  contact:
    email: support@gloo.com
    name: API Support
  description: API documentation for Gloo
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Gloo API
  version: "1.0"
paths:
  /recipes:
    get:
      consumes:
      - application/json
      description: Get all recipes by search and category
      parameters:
      - description: Search term for recipes
        in: query
        name: searchParam
        type: string
      - description: Category filter for recipes
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved recipes
          schema:
            $ref: '#/definitions/models.RecipeExampleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get all recipes
      tags:
      - Recipes
  /recipes/{id}:
    get:
      consumes:
      - application/json
      description: Get a specific recipe by its ID
      parameters:
      - description: Recipe ID
        in: path
        minimum: 1
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved recipe
          schema:
            allOf:
            - $ref: '#/definitions/models.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Recipe'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Recipe not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get recipe by ID
      tags:
      - Recipes
schemes:
- https
swagger: "2.0"
